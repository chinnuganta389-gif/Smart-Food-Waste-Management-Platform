const PAGES = {};
let currentRole = 'admin';
let currentPage = 'admin-dashboard';
let chartInstances = {};

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function showToast(msg, icon='✅') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').textContent = icon;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchRole(role, btn) {
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRole = role;
  buildNav(role);
  const firstPage = NAV[role][0].items[0].id;
  navigate(firstPage);
}

function buildNav(role) {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  NAV[role].forEach(sec => {
    const s = document.createElement('div');
    s.className = 'nav-section';
    s.innerHTML = `<div class="nav-label">${sec.section}</div>`;
    sec.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'nav-item' + (item.id === currentPage ? ' active' : '');
      btn.id = 'nav-' + item.id;
      btn.onclick = () => navigate(item.id);
      btn.innerHTML = `<i class="ti ${item.icon}" aria-hidden="true"></i><span>${item.label}</span>${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}`;
      s.appendChild(btn);
    });
    nav.appendChild(s);
  });
}

function navigate(pageId) {
  Object.keys(chartInstances).forEach(k => destroyChart(k));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + pageId);
  if (nb) nb.classList.add('active');
  currentPage = pageId;
  const label = pageId.split('-').slice(1).map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
  document.getElementById('page-title').textContent = label;
  document.getElementById('breadcrumb').textContent = `FoodShare / ${currentRole[0].toUpperCase()+currentRole.slice(1)} / ${label}`;
  renderPage(pageId);
}

function renderPage(id) {
  const area = document.getElementById('content-area');
  area.innerHTML = '';
  const renderer = PAGES[id];
  if (renderer) renderer(area);
  else { area.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="ti ti-tool"></i></div><div class="empty-title">Coming soon</div><div class="empty-sub">This module is under development</div></div>`; }
}
